<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'companys')}">

<body>

  <h2 th:text="#{company}">Companys</h2>
  
  <table id="companys" class="table table-striped">
    <thead>
      <tr>
        <th th:text="#{name}" style="width: 150px;">Name</th>      
        <th style="width: 120px">TEL</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="company : ${listCompanys}">
        <td>
          <a th:href="@{/companys/{id}(id=${company.id})}" th:text="${company.companyName}">Company Name</a>
        </td>      
        <td>
			<span th:text="${company.telephone}">TEL</span>
        </td>
      </tr>
    </tbody>
  </table>

</body>
</html>
