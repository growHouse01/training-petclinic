<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'companys')}">

<body>

  <h2 th:text="#{company}">Companys</h2>
  
  <table id="companys" class="table table-striped">
    <thead>
      <tr>
        <th th:text="#{name}" style="width: 150px;">Name</th>      
        <th style="width: 120px">TEL</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="company : ${listCompanys}">
        <td>
          <a th:href="@{/companys/{id}(id=${company.id})}" th:text="${company.companyName}">Company Name</a>
        </td>      
        <td>
			<span th:text="${company.telephone}">TEL</span>
        </td>
      </tr>
    </tbody>
  </table>
   <div th:if="${totalPages > 1}">
      <span th:text="#{pages}">Pages:</span>
      <span>[</span>
      <span th:each="i: ${#numbers.sequence(1, totalPages)}">
        <a th:if="${currentPage != i}" th:href="@{'/companys?page=' + ${i}}">[[${i}]]</a>
        <span th:unless="${currentPage != i}">[[${i}]]</span>
      </span>
	  <span>]&nbsp;</span>
	      <span>
	        <a th:if="${currentPage > 1}" th:href="@{'/companys?page=1'}" th:title="#{first}" class="fa fa-fast-backward"></a>
	        <span th:unless="${currentPage > 1}" th:title="#{first}" class="fa fa-fast-backward"></span>
	      </span>
      <span>
        <a th:if="${currentPage > 1}" th:href="@{'/companys?page=__${currentPage - 1}__'}" th:title="#{previous}"
          class="fa fa-step-backward"></a>
        <span th:unless="${currentPage > 1}" th:title="#{previous}" class="fa fa-step-backward"></span>
      </span> 
      <span>
        <a th:if="${currentPage < totalPages}" th:href="@{'/companys?page=__${currentPage + 1}__'}" th:title="#{next}"
          class="fa fa-step-forward"></a>
        <span th:unless="${currentPage < totalPages}" th:title="#{next}" class="fa fa-step-forward"></span>
      </span>
      <span>
        <a th:if="${currentPage < totalPages}" th:href="@{'/companys?page=__${totalPages}__'}" th:title="#{last}"
          class="fa fa-fast-forward"></a>
        <span th:unless="${currentPage < totalPages}" th:title="#{last}" class="fa fa-fast-forward"></span>
      </span>
    </div>
  </body>
</html>
