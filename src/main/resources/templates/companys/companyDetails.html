<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'companys')}">

<body>

  <h2 th:text="#{companyInformation}">Company Information</h2>

  <div th:if="${message}" class="alert alert-success" id="success-message">
    <span th:text="${message}"></span>
  </div>

  <div th:if="${error}" class="alert alert-danger" id="error-message">
    <span th:text="${error}"></span>
  </div>

  <table class="table table-striped" th:object="${company}">
    <tr>
      <th th:text="#{id}">ID</th>
	  <td th:text="*{id}"></td>	     
    </tr>
    <tr>
      <th th:text="#{companyName}">companyName</th>
      <td th:text="*{companyName}"></td>
    </tr>
    <tr>
      <th th:text="#{telephone}">TEL</th>
      <td th:text="*{telephone}"></td>
    </tr>
    
  </table>

  <a th:href="@{__${company.id}__/edit}" class="btn btn-primary" th:text="#{editCompany}">Edit Company</a>
 

  <br />
  <br />
  <br />
 

</body>


</html>
