<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'companys')}">

<body>

  <h2 th:text="#{findCompany}">Find Companys</h2>

  <form th:object="${company}" th:action="@{/companys}" method="get" class="form-horizontal" id="search-companyname-form">
    <div class="form-group">
	 <div class="control-group" id="companysnameGroup">
    <label class="col-sm-2 control-label" th:text="#{companyname}">Company Name </label>
    <div class="col-sm-10">
      <input class="form-control" th:field="*{companyName}" size="30" maxlength="80" />
      <span class="help-inline">
      </span>
    </div>
    </div>
  </div><br>
  
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button type="submit" class="btn btn-primary" th:text="#{findCompany}">Find Company</button>
      </div>
    </div>

   
	<div th:if="${#fields.hasAnyErrors()}">
      <p th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</p>
    </div>
	

  </form>

</body>

</html>
